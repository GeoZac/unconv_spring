<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sensor Auth Tokens Expired</title>
</head>
<body>
<p>Dear <strong th:text="${username}">Username</strong>,</p>

<p>The following sensor auth tokens have <strong>expired</strong> and are no longer valid:</p>

<table style="border-collapse: collapse; width: 100%; border: 1px solid #ccc;">
    <thead>
    <tr style="background-color: #f5f5f5;">
        <th style="border: 1px solid #ccc; padding: 8px; text-align: left;">Sensor Name</th>
        <th style="border: 1px solid #ccc; padding: 8px; text-align: left;">Expiry Date</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="token : ${tokens}">
        <td style="border: 1px solid #ccc; padding: 8px;" th:text="${token.sensorName}">Sensor Name</td>
        <td style="border: 1px solid #ccc; padding: 8px;" th:text="${token.expiryDate}">Expiry Date</td>
    </tr>
    </tbody>
</table>

<p><strong>Action Required:</strong> Please generate new sensor auth tokens immediately to restore access and avoid service interruption.</p>

<p style="margin-top: 20px;">Best regards,<br/>Sensor Monitoring Team</p>
</body>
</html>
