<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sensor Auth Token Expired</title>
</head>
<body>
<p>Dear <strong th:text="${username}">Username</strong>,</p>
<p>Your sensor auth token has <strong>expired</strong> and is no longer valid.</p>
<table style="border: 1px solid #ccc; padding: 10px;">
    <tr>
        <td><b>Sensor Name:</b></td>
        <td th:text="${sensorName}">Sensor Name</td>
    </tr>
    <tr>
        <td><b>Expiry Date:</b></td>
        <td th:text="${expiryDate}">Expiry Date</td>
    </tr>
</table>
<p><strong>Action Required:</strong> Please generate a new sensor auth token immediately to restore access and avoid service interruption.</p>
<p style="margin-top: 20px;">Best regards,<br/>Sensor Monitoring Team</p>
</body>
</html>
