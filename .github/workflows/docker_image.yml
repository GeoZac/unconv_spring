name: Build Docker image
on:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      matrix:
        distribution: [ 'temurin' ]
        java: [ '17' ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build for test
        uses: docker/build-push-action@v7.0.0
        with:
          push: false
