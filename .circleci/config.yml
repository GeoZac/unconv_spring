version: 2.1
jobs:
  build:
    docker:
      - image: cimg/openjdk:16.0.2
      - image: cimg/mysql:8.0

    working_directory: ~/unconv_spring

    environment:
      MAVEN_OPTS: -Xmx3200m

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "pom.xml" }}
            - v1-dependencies-

      - run: mvn install

      - save_cache:
          paths:
            - ~/.m2
          key: v1-dependencies-{{ checksum "pom.xml" }}
