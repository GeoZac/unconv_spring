version: 2.1
orbs:
  codecov: codecov/codecov@5.4.3
  docker: circleci/docker@3.0.1
  owasp: entur/owasp@0.0.19

# Define custom executors for reuse
executors:
  java-machine:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true
    resource_class: large
    working_directory: /tmp/spring
    environment:
      MAVEN_OPTS: -Xmx3200m

# Define reusable commands
commands:
  install_java:
    description: "Install and configure OpenJDK 17"
    steps:
      - run:
          name: Install OpenJDK 17
          command: |
            sudo apt-get update && sudo apt-get install -y openjdk-17-jdk
            sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
            sudo update-alternatives --set javac /usr/lib/jvm/java-17-openjdk-amd64/bin/javac
            java -version

  restore_maven_cache:
    description: "Restore Maven dependencies from cache"
    steps:
      - restore_cache:
          keys:
            - v2-dependencies-{{ checksum "pom.xml" }}
            - v2-dependencies-

  save_maven_cache:
    description: "Save Maven dependencies to cache"
    steps:
      - save_cache:
          paths:
            - ~/.m2
          key: v2-dependencies-{{ checksum "pom.xml" }}

jobs:
  setup:
    executor: java-machine
    steps:
      - checkout
      - install_java
      - restore_maven_cache
      - run:
          name: Grant execute permission for mvnw
          command: chmod +x mvnw
      - run:
          name: Download dependencies and resolve
          command: ./mvnw dependency:go-offline dependency:resolve-plugins
      - save_maven_cache
      - persist_to_workspace:
          root: /tmp/spring
          paths: ["*", "**/*"]

  build:
    executor: java-machine
    steps:
      - attach_workspace:
          at: /tmp/spring
      - install_java
      - restore_maven_cache
      - run:
          name: Build with Maven
          command: ./mvnw -DskipTests clean install
      - persist_to_workspace:
          root: /tmp/spring
          paths:
            - target
      - store_artifacts:
          path: target/*.jar
          destination: jars

  test:
    executor: java-machine
    parallelism: 4
    steps:
      - attach_workspace:
          at: /tmp/spring
      - install_java
      - restore_maven_cache
      - run:
          name: Run parallel tests
          command: |
            cd src/test/java/
            TESTS=$(circleci tests glob "com/**/*.java" | sed 's/\.java$//;s/\//./g' | circleci tests split --split-by=timings | paste -sd, -)
            cd ../../..
            echo "Running tests: $TESTS"
            ./mvnw -Dtest="$TESTS" test
      - run:
          name: Run integration tests
          command: ./mvnw verify -DskipUTs=true
      - store_test_results:
          path: target/test-results
      - store_artifacts:
          path: target/surefire-reports
          destination: test-reports

  smoke_test:
    docker:
      - image: cimg/openjdk:17.0
    resource_class: medium
    steps:
      - attach_workspace:
          at: /tmp/spring
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build Docker image
          command: |
            docker build -t unconv-spring:test .
      - run:
          name: Run container
          command: |
            docker run -d -p 8080:8080 --name unconv-spring-container unconv-spring:test
      - run:
          name: Wait for container and test HTTP endpoint
          command: |
            echo "Waiting for application to be ready..."
            for i in {1..30}; do
              echo "Attempt $i: Checking if app is ready inside container..."
              if docker exec unconv-spring-container wget --quiet --spider http://localhost:8080/public/status/v1/version; then
                echo "App is ready inside container!"
                exit 0
              fi
              echo "App not ready yet inside container... retrying in 5 seconds"
              sleep 5
            done
            echo "App failed to start inside container after 30 retries. Showing container logs:"
            docker logs unconv-spring-container
            exit 1

  analyse:
    executor: java-machine
    steps:
      - attach_workspace:
          at: /tmp/spring
      - install_java
      - restore_maven_cache
      - run:
          name: Run CheckStyle
          command: ./mvnw checkstyle:checkstyle
      - run:
          name: Analyze on SonarCloud
          command: ./mvnw verify sonar:sonar -Dsonar.projectKey=GeoZac_unconv_spring
      - codecov/upload:
          files: target/jacoco/test/jacoco.xml
          flags: controllers_test
      - codecov/upload:
          files: target/jacoco/integrationTest/jacoco.xml
          flags: integration_test
      - store_artifacts:
          path: target/jacoco/test
          destination: coverage/unit
      - store_artifacts:
          path: target/jacoco/integrationTest
          destination: coverage/integration

  doc:
    executor: java-machine
    resource_class: medium
    steps:
      - attach_workspace:
          at: /tmp/spring
      - install_java
      - restore_maven_cache
      - run:
          name: Build API doc
          command: ./mvnw package -Dunconv.skip.asciidoctor=false
      - run:
          name: Build JavaDoc
          command: ./mvnw javadoc:javadoc
      - store_artifacts:
          path: target/generated-docs/index.pdf
          destination: api-docs
      - store_artifacts:
          path: target/site/apidocs
          destination: javadocs

workflows:
  build-and-test:
    jobs:
      - setup
      - owasp/maven_owasp_dependency_check:
          filters:
            branches:
              only:
                - master
                - /dependabot\/.*/
                - /chore\/.*/
                - /infra\/.*/
      - build:
          requires:
            - setup
      - test:
          requires:
            - build
      - smoke_test:
          requires:
            - build
          filters:
            branches:
              only:
                - master
                - /dependabot\/.*/
                - /chore\/.*/
                - /infra\/.*/
      - analyse:
          context: SonarCloud
          requires:
            - test
      - doc:
          requires:
            - build
          filters:
            branches:
              only:
                - /docs\/.*/
                - /infra\/.*/
                - master
            tags:
              only: /^v.*/
      - docker/hadolint:
          requires:
            - setup
      - docker/publish:
          deploy: false
          image: spring-test
          requires:
            - smoke_test
          filters:
            branches:
              only:
                - master
